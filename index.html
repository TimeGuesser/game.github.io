<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TimeGuesser — угадай место и год</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            height: 100%;
            background: #f0f2f5;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .screen {
            width: 100%;
            max-width: 1300px;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 95vh;
            overflow: hidden;
        }
        .hidden {
            display: none !important;
        }
        /* --- Меню --- */
        .menu-screen {
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
        }
        .menu-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff8c42, #e0692c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .menu-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .menu-btn {
            background: #ff8c42;
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .menu-btn:active {
            transform: scale(0.96);
        }
        /* --- Игровой экран --- */
        .game-screen {
            display: flex;
            flex-direction: column;
        }
        .game-header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #dee2e6;
            background: #ffffff;
        }
        .back-btn {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
        }
        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff8c42, #e0692c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-block {
            flex-shrink: 0;
            background: #f8f9fa;
            margin: 8px 12px 0 12px;
            padding: 8px 12px;
            border-radius: 1rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid #dee2e6;
            color: #212529;
            line-height: 1.4;
        }
        .main-view {
            flex: 1;
            min-height: 0;
            background: #e9ecef;
            overflow: hidden;
            position: relative;
            margin: 8px 12px;
            border-radius: 1rem;
        }
        .view-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.2s ease;
        }
        .view-hidden {
            opacity: 0;
            pointer-events: none;
        }
        #mapView {
            width: 100%;
            height: 100%;
        }
        .image-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: #e9ecef;
            touch-action: none;
            cursor: grab;
        }
        .image-wrapper:active {
            cursor: grabbing;
        }
        .historical-img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
            pointer-events: none;
        }
        .zoom-buttons {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 6px 12px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .zoom-btn {
            background: #ff8c42;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .zoom-btn:active {
            transform: scale(0.95);
        }
        .switch-btn {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            border: 1px solid #ff8c42;
            transition: 0.1s;
        }
        .switch-btn:active {
            transform: scale(0.95);
        }
        .switch-icon {
            font-size: 24px;
        }
        .selected-info {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: white;
            z-index: 10;
            pointer-events: none;
            font-weight: 500;
            white-space: nowrap;
        }
        @media (max-width: 700px) {
            .selected-info {
                font-size: 10px;
                white-space: normal;
                max-width: 70%;
            }
        }
        .control-bar {
            flex-shrink: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
            border-top: 1px solid #dee2e6;
        }
        .year-slider-area {
            width: 100%;
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 2rem;
            border: 1px solid #dee2e6;
        }
        .year-label {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: #212529;
        }
        input[type="range"] {
            width: 100%;
        }
        .big-btn {
            width: 100%;
            background: #ff8c42;
            border: none;
            padding: 10px;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: white;
            text-align: center;
            transition: 0.1s;
        }
        .big-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* Скрываем надписи API и условия использования на карте */
        .ymaps-copyrights-pane,
        .ymaps-logo,
        .ymaps-copyright {
            display: none !important;
        }
        @media (max-width: 700px) {
            .menu-title { font-size: 1.8rem; }
            .menu-btn { padding: 10px 24px; font-size: 1rem; }
            .game-title { font-size: 1.1rem; }
            .info-block { font-size: 0.75rem; }
            .control-bar { gap: 8px; }
        }
    </style>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=c03f89a7-f0e9-47b7-95f0-57e818aa7701&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <!-- Меню -->
    <div id="menuScreen" class="screen menu-screen">
        <div class="menu-title">TIMEGUESSER RUSSIA</div>
        <div class="menu-buttons">
            <button id="singlePlayerBtn" class="menu-btn">Одиночная игра</button>
            <button id="multiPlayerBtn" class="menu-btn">Многопользовательская</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" class="screen game-screen hidden">
        <div class="game-header">
            <button id="backToMenuBtn" class="back-btn">← Назад</button>
            <div class="game-title">TIMEGUESSER</div>
            <div style="width: 60px;"></div>
        </div>
        <div class="info-block" id="infoBlock">
            📍 Нажми на карту, чтобы выбрать место, и выбери год на ползунке
        </div>
        <div class="main-view">
            <div class="view-container">
                <div id="mapView" class="view"></div>
                <div id="imageView" class="view view-hidden">
                    <div class="image-wrapper" id="imageWrapper">
                        <img id="historicalImage" class="historical-img" src="" alt="Историческое фото">
                    </div>
                    <div class="zoom-buttons">
                        <button class="zoom-btn" id="zoomOut">−</button>
                        <button class="zoom-btn" id="zoomIn">+</button>
                    </div>
                </div>
                <div class="switch-btn" id="switchViewBtn">
                    <span class="switch-icon" id="switchIcon">🗺️</span>
                </div>
                <div class="selected-info" id="selectedInfo">
                    📍 Место: <span id="coordsDisplay">—</span> &nbsp;|&nbsp; 🎯 Очки: <span id="lastPoints">—</span> &nbsp;|&nbsp; 🏆 <span id="totalScore">0</span>
                </div>
            </div>
        </div>
        <div class="control-bar">
            <div class="year-slider-area">
                <div class="year-label">
                    <span>🗓️ ВЫБЕРИТЕ ГОД</span>
                    <span id="yearValueDisplay">1950</span>
                </div>
                <input type="range" id="yearSlider" min="1850" max="2024" step="1" value="1950">
            </div>
            <button id="actionBtn" class="big-btn">✅ ПРОВЕРИТЬ</button>
        </div>
    </div>

    <script>
        (function() {
            // ----- ДАННЫЕ ВОПРОСОВ -----
            const QUESTIONS = [
                { imageUrl: "img/red_square.jpg", correctLat: 55.7537, correctLng: 37.6199, correctYear: 1905, description: "Красная площадь, Москва, начало XX века" },
                { imageUrl: "img/nevsky.jpg", correctLat: 59.9343, correctLng: 30.3061, correctYear: 1910, description: "Невский проспект, Санкт-Петербург, 1910-е" },
                { imageUrl: "img/vladivostok_station.jpg", correctLat: 43.1155, correctLng: 131.8855, correctYear: 1995, description: "Железнодорожный вокзал Владивостока" },
                { imageUrl: "img/baikal.jpg", correctLat: 53.5, correctLng: 107.5, correctYear: 1980, description: "Озеро Байкал" },
                { imageUrl: "img/catherine_palace.jpg", correctLat: 59.7167, correctLng: 30.3964, correctYear: 1912, description: "Царское Село, Екатерининский дворец" }
            ];

            // DOM элементы игры
            const yearSlider = document.getElementById('yearSlider');
            const yearValueDisplay = document.getElementById('yearValueDisplay');
            const actionBtn = document.getElementById('actionBtn');
            const totalScoreSpan = document.getElementById('totalScore');
            const lastPointsSpan = document.getElementById('lastPoints');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const historicalImg = document.getElementById('historicalImage');
            const switchViewBtn = document.getElementById('switchViewBtn');
            const mapView = document.getElementById('mapView');
            const imageView = document.getElementById('imageView');
            const infoBlock = document.getElementById('infoBlock');
            const zoomInBtn = document.getElementById('zoomIn');
            const zoomOutBtn = document.getElementById('zoomOut');
            const imageWrapper = document.getElementById('imageWrapper');

            // Переменные игры
            let currentIndex = 0;
            let userMarker = null, correctMarker = null, distanceLine = null;
            let selectedLat = null, selectedLng = null;
            let selectedYear = 1950;
            let totalPoints = 0;
            let questionAnswered = false;
            let map = null;
            let currentView = 'image';

            // --- Управление изображением (улучшенное, с гарантированным центрированием) ---
            let imgW = 0, imgH = 0;          // реальные размеры изображения
            let scale = 1;                   // текущий масштаб
            let translateX = 0, translateY = 0; // смещение в пикселях (относительно левого верхнего угла)

            // Функция применения трансформации
            function applyTransform() {
                historicalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }

            // Вычисление допустимого диапазона смещения
            function getBounds() {
                const rect = imageWrapper.getBoundingClientRect();
                if (!rect.width || !rect.height) return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
                const scaledW = imgW * scale;
                const scaledH = imgH * scale;
                const minX = rect.width - scaledW;  // может быть отрицательным или положительным
                const maxX = 0;
                const minY = rect.height - scaledH;
                const maxY = 0;
                return { minX, maxX, minY, maxY };
            }

            // Ограничение текущего смещения в пределах допустимого
            function clampTranslation() {
                if (imgW === 0) return;
                const { minX, maxX, minY, maxY } = getBounds();
                translateX = Math.min(maxX, Math.max(minX, translateX));
                translateY = Math.min(maxY, Math.max(minY, translateY));
                applyTransform();
            }

            // Центрирование изображения (вычисление смещения для идеального центра)
            function centerImage() {
                if (imgW === 0) return;
                const rect = imageWrapper.getBoundingClientRect();
                if (!rect.width || !rect.height) return;
                const scaledW = imgW * scale;
                const scaledH = imgH * scale;
                translateX = (rect.width - scaledW) / 2;
                translateY = (rect.height - scaledH) / 2;
                clampTranslation();
            }

            // Изменение масштаба с автоматическим центрированием
            function setZoom(delta) {
                if (imgW === 0) return;
                let newScale = scale + delta;
                newScale = Math.min(3, Math.max(0.5, newScale));
                if (newScale === scale) return;
                scale = newScale;
                centerImage();  // сразу центрируем после изменения масштаба
            }

            // Сброс (при загрузке нового вопроса)
            function resetImage() {
                scale = 1;
                centerImage();
            }

            // Загрузка изображения
            function loadImage() {
                const q = QUESTIONS[currentIndex];
                const img = new Image();
                img.onload = () => {
                    imgW = img.width;
                    imgH = img.height;
                    historicalImg.src = q.imageUrl;
                    historicalImg.style.width = `${imgW}px`;
                    historicalImg.style.height = `${imgH}px`;
                    resetImage();
                };
                img.onerror = () => {
                    imgW = 400; imgH = 260;
                    historicalImg.src = `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260"><rect width="100%" height="100%" fill="#6c757d"/><text x="200" y="130" text-anchor="middle" fill="white" font-size="18">Не загружено</text><text x="200" y="170" text-anchor="middle" fill="#f8f9fa" font-size="14">${q.description}</text></svg>`)}`;
                    historicalImg.style.width = '400px';
                    historicalImg.style.height = '260px';
                    resetImage();
                };
                img.src = q.imageUrl;
            }

            // --- Мышь (панорамирование) ---
            let drag = false, dragStartX = 0, dragStartY = 0, dragStartTranslateX = 0, dragStartTranslateY = 0;

            function onMouseDown(e) {
                if (currentView !== 'image') return;
                e.preventDefault();
                drag = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragStartTranslateX = translateX;
                dragStartTranslateY = translateY;
                imageWrapper.style.cursor = 'grabbing';
            }
            function onMouseMove(e) {
                if (!drag || currentView !== 'image') return;
                e.preventDefault();
                translateX = dragStartTranslateX + (e.clientX - dragStartX);
                translateY = dragStartTranslateY + (e.clientY - dragStartY);
                clampTranslation();
            }
            function onMouseUp() {
                drag = false;
                imageWrapper.style.cursor = 'grab';
            }
            function onWheel(e) {
                if (currentView !== 'image') return;
                e.preventDefault();
                setZoom(e.deltaY > 0 ? -0.1 : 0.1);
            }

            // --- Тач (панорамирование и pinch) ---
            let touchData = { scale: 1, dist: 0, active: false, startTranslateX: 0, startTranslateY: 0 };
            function onTouchStart(e) {
                if (currentView !== 'image') return;
                const touches = e.touches;
                if (touches.length === 1) {
                    touchData.active = true;
                    touchData.startX = touches[0].clientX;
                    touchData.startY = touches[0].clientY;
                    touchData.startTranslateX = translateX;
                    touchData.startTranslateY = translateY;
                    e.preventDefault();
                } else if (touches.length === 2) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    touchData.dist = Math.hypot(dx, dy);
                    touchData.scale = scale;
                    touchData.active = true;
                    e.preventDefault();
                }
            }
            function onTouchMove(e) {
                if (currentView !== 'image') return;
                const touches = e.touches;
                if (touches.length === 1 && touchData.active && !touchData.dist) {
                    const dx = touches[0].clientX - touchData.startX;
                    const dy = touches[0].clientY - touchData.startY;
                    translateX = touchData.startTranslateX + dx;
                    translateY = touchData.startTranslateY + dy;
                    clampTranslation();
                    e.preventDefault();
                } else if (touches.length === 2 && touchData.dist) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    const newDist = Math.hypot(dx, dy);
                    const delta = (newDist / touchData.dist) * touchData.scale - scale;
                    setZoom(delta);
                    e.preventDefault();
                }
            }
            function onTouchEnd() {
                touchData = { scale: 1, dist: 0, active: false, startTranslateX: 0, startTranslateY: 0 };
            }

            // --- Яндекс.Карты ---
            let mapInitPromise = null;

            function initYandexMap() {
                if (mapInitPromise) return mapInitPromise;
                mapInitPromise = new Promise((resolve) => {
                    if (window.ymaps) {
                        window.ymaps.ready(() => {
                            map = new window.ymaps.Map("mapView", {
                                center: [62.0, 95.0],
                                zoom: 4,
                                controls: ["zoomControl"]
                            }, {
                                suppressMapOpenBlock: true,
                                yandexMapDisablePoiInteractivity: true
                            });
                            map.options.set("restrictMapArea", [[41, 19], [82, 190]]);
                            map.events.add("click", (e) => {
                                if (questionAnswered) {
                                    setInfo("⚠️ Вопрос уже проверен! Нажмите «Следующий».", 3000);
                                    return;
                                }
                                const coords = e.get("coords");
                                selectedLat = coords[0];
                                selectedLng = coords[1];
                                coordsDisplay.innerText = `${selectedLat.toFixed(2)}°, ${selectedLng.toFixed(2)}°`;
                                if (userMarker) map.geoObjects.remove(userMarker);
                                userMarker = new window.ymaps.Placemark(coords, {
                                    hintContent: "Ваш выбор",
                                }, {
                                    preset: "islands#blueCircleIcon",
                                });
                                map.geoObjects.add(userMarker);
                                setInfo(`✅ Место выбрано: ${selectedLat.toFixed(2)}°, ${selectedLng.toFixed(2)}°`, 2000);
                            });
                            resolve();
                        });
                    } else {
                        setTimeout(initYandexMap, 100);
                    }
                });
                return mapInitPromise;
            }

            function clearMapMarkers() {
                if (!map) return;
                if (userMarker) map.geoObjects.remove(userMarker);
                if (correctMarker) map.geoObjects.remove(correctMarker);
                if (distanceLine) map.geoObjects.remove(distanceLine);
                userMarker = correctMarker = distanceLine = null;
            }

            function addCorrectMarker(lat, lng, year) {
                correctMarker = new window.ymaps.Placemark([lat, lng], {
                    hintContent: `Правильное место (год ${year})`,
                }, {
                    preset: "islands#greenCircleIcon",
                });
                map.geoObjects.add(correctMarker);
            }

            function drawLineAndZoom(ul, ulng, cl, clng) {
                if (distanceLine) map.geoObjects.remove(distanceLine);
                distanceLine = new window.ymaps.Polyline([[ul, ulng], [cl, clng]], {}, {
                    strokeColor: "#ff8c42",
                    strokeWidth: 3,
                    strokeStyle: "dash",
                });
                map.geoObjects.add(distanceLine);
                const bounds = window.ymaps.util.bounds.fromPoints([[ul, ulng], [cl, clng]]);
                map.setBounds(bounds, { checkZoomRange: true, zoomMargin: 70 });
            }

            // --- Игровая логика ---
            function getDistance(lat1, lng1, lat2, lng2) {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI/180;
                const dLng = (lng2 - lng1) * Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            function calcPoints(ul, uLng, uYear, cl, cLng, cYear) {
                const dist = getDistance(ul, uLng, cl, cLng);
                const ydiff = Math.abs(uYear - cYear);
                const pDist = Math.max(0, 100 * (1 - Math.min(1, dist/2000)));
                const pYear = Math.max(0, 100 * (1 - Math.min(1, ydiff/80)));
                return { final: Math.round((pDist+pYear)/2*100)/100, dist, ydiff };
            }

            let infoTimeout;
            function setInfo(msg, dur = 3000) {
                clearTimeout(infoTimeout);
                infoBlock.innerHTML = msg;
                infoTimeout = setTimeout(() => {
                    if (!questionAnswered) infoBlock.innerHTML = "📍 Нажми на карту, чтобы выбрать место, и выбери год на ползунке";
                }, dur);
            }

            function switchView() {
                if (currentView === 'image') {
                    mapView.classList.remove('view-hidden');
                    imageView.classList.add('view-hidden');
                    currentView = 'map';
                    document.getElementById('switchIcon').innerHTML = '🖼️';
                    if (map) map.container.fitToViewport();
                } else {
                    mapView.classList.add('view-hidden');
                    imageView.classList.remove('view-hidden');
                    currentView = 'image';
                    document.getElementById('switchIcon').innerHTML = '🗺️';
                    centerImage();
                }
            }

            function zoomImage(delta) {
                if (currentView !== 'image') return;
                setZoom(delta);
            }

            function loadQuestion() {
                questionAnswered = false;
                actionBtn.disabled = false;
                actionBtn.innerText = "✅ ПРОВЕРИТЬ";
                actionBtn.onclick = handleCheck;
                setInfo("📍 Нажми на карту, чтобы выбрать место, и выбери год на ползунке", 2000);
                clearMapMarkers();
                selectedLat = selectedLng = null;
                coordsDisplay.innerText = '—';
                lastPointsSpan.innerText = '—';
                const q = QUESTIONS[currentIndex];
                const randYear = Math.floor(Math.random() * (2024-1850+1)) + 1850;
                yearSlider.value = randYear;
                selectedYear = randYear;
                yearValueDisplay.innerText = randYear;
                loadImage();
            }

            function updateYear() {
                selectedYear = parseInt(yearSlider.value);
                yearValueDisplay.innerText = selectedYear;
            }
            yearSlider.addEventListener('input', () => {
                if (questionAnswered) {
                    setInfo("⚠️ Вопрос уже проверен, изменить год нельзя.", 2000);
                    yearSlider.value = selectedYear;
                    return;
                }
                updateYear();
            });

            function handleCheck() {
                if (questionAnswered) {
                    setInfo("❗ Ты уже получил очки. Нажми «Следующий».", 3000);
                    return;
                }
                if (selectedLat === null) {
                    setInfo("⚠️ Сначала выбери место на карте!", 3000);
                    return;
                }
                actionBtn.disabled = true;
                const q = QUESTIONS[currentIndex];
                const res = calcPoints(selectedLat, selectedLng, selectedYear, q.correctLat, q.correctLng, q.correctYear);
                totalPoints += res.final;
                totalScoreSpan.innerText = Math.floor(totalPoints*100)/100;
                lastPointsSpan.innerText = res.final.toFixed(1);
                setInfo(`✅ <strong>Правильный ответ:</strong> ${q.description}<br>📍 Координаты: ${q.correctLat.toFixed(2)}°, ${q.correctLng.toFixed(2)}°<br>🗓️ Год: ${q.correctYear}<br>📏 Ваше расстояние: ${res.dist.toFixed(1)} км`, 8000);
                addCorrectMarker(q.correctLat, q.correctLng, q.correctYear);
                drawLineAndZoom(selectedLat, selectedLng, q.correctLat, q.correctLng);
                if (userMarker) userMarker.properties.set("hintContent", `Ваш выбор (${selectedYear} г.)<br>Расстояние: ${res.dist.toFixed(1)} км`);
                questionAnswered = true;
                if (currentIndex+1 < QUESTIONS.length) {
                    actionBtn.innerText = "➡️ СЛЕДУЮЩИЙ ВОПРОС";
                    actionBtn.disabled = false;
                    actionBtn.onclick = () => {
                        if (!questionAnswered) return;
                        if (currentView === 'map') switchView();
                        currentIndex++;
                        loadQuestion();
                    };
                } else {
                    actionBtn.innerText = "🏁 ФИНИШ";
                    actionBtn.disabled = false;
                    actionBtn.onclick = () => {
                        setInfo(`Игра завершена! Счёт: ${Math.floor(totalPoints*100)/100} из ${QUESTIONS.length*100}`, 5000);
                        actionBtn.disabled = true;
                    };
                }
            }

            // --- Запуск игры ---
            async function startGame() {
                await initYandexMap();
                totalPoints = 0;
                totalScoreSpan.innerText = "0";
                currentIndex = 0;
                loadQuestion();
                mapView.classList.add('view-hidden');
                imageView.classList.remove('view-hidden');
                currentView = 'image';
                document.getElementById('switchIcon').innerHTML = '🗺️';
            }

            // --- Переключение между меню и игрой ---
            const menuScreen = document.getElementById('menuScreen');
            const gameScreen = document.getElementById('gameScreen');
            const singleBtn = document.getElementById('singlePlayerBtn');
            const multiBtn = document.getElementById('multiPlayerBtn');
            const backBtn = document.getElementById('backToMenuBtn');

            singleBtn.addEventListener('click', () => {
                menuScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                startGame();
            });
            multiBtn.addEventListener('click', () => {
                alert("Многопользовательский режим в разработке. Скоро появится!");
            });
            backBtn.addEventListener('click', () => {
                gameScreen.classList.add('hidden');
                menuScreen.classList.remove('hidden');
            });

            // Подключаем обработчики управления изображением
            imageWrapper.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            imageWrapper.addEventListener('wheel', onWheel, { passive: false });
            imageWrapper.style.cursor = 'grab';

            imageWrapper.addEventListener('touchstart', onTouchStart, { passive: false });
            imageWrapper.addEventListener('touchmove', onTouchMove, { passive: false });
            imageWrapper.addEventListener('touchend', onTouchEnd);
            imageWrapper.addEventListener('touchcancel', onTouchEnd);

            switchViewBtn.addEventListener('click', switchView);
            zoomInBtn.addEventListener('click', () => zoomImage(0.2));
            zoomOutBtn.addEventListener('click', () => zoomImage(-0.2));

            // При изменении размера окна пересчитываем центрирование
            window.addEventListener('resize', () => {
                if (!gameScreen.classList.contains('hidden') && currentView === 'image') {
                    centerImage();
                } else if (map) {
                    map.container.fitToViewport();
                }
            });
        })();
    </script>
</body>
</html>
