<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TimeGuesser — угадай место и год</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api-maps.yandex.ru/2.1/?apikey=c03f89a7-f0e9-47b7-95f0-57e818aa7701&lang=ru_RU" type="text/javascript"></script>
</head>
<body>
    <!-- Меню -->
    <div id="menuScreen" class="screen menu-screen">
        <div class="menu-title">TIMEGUESSER RUSSIA</div>
        <div class="menu-buttons">
            <button id="singlePlayerBtn" class="menu-btn">Одиночная игра</button>
            <button id="multiPlayerBtn" class="menu-btn">Многопользовательская</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" class="screen game-screen hidden">
        <div class="game-header">
            <button id="backToMenuBtn" class="back-btn">← Назад</button>
            <div class="game-title">TIMEGUESSER</div>
            <div style="width: 60px;"></div>
        </div>
        <div class="info-block" id="infoBlock">
            📍 Нажми на карту, чтобы выбрать место, и выбери год на ползунке
        </div>
        <div class="main-view">
            <div class="view-container">
                <div id="mapView" class="view"></div>
                <div id="imageView" class="view view-hidden">
                    <div class="image-wrapper" id="imageWrapper">
                        <img id="historicalImage" class="historical-img" src="" alt="Историческое фото">
                    </div>
                    <div class="zoom-buttons">
                        <button class="zoom-btn" id="zoomOut">−</button>
                        <button class="zoom-btn" id="zoomIn">+</button>
                    </div>
                </div>
                <div class="switch-btn" id="switchViewBtn">
                    <span class="switch-icon" id="switchIcon">🗺️</span>
                </div>
                <div class="selected-info" id="selectedInfo">
                    📍 Место: <span id="coordsDisplay">—</span> &nbsp;|&nbsp; 🎯 Очки: <span id="lastPoints">—</span> &nbsp;|&nbsp; 🏆 <span id="totalScore">0</span>
                </div>
            </div>
        </div>
        <div class="control-bar">
            <div class="year-slider-area">
                <div class="year-label">
                    <span>🗓️ ВЫБЕРИТЕ ГОД</span>
                    <span id="yearValueDisplay">1950</span>
                </div>
                <input type="range" id="yearSlider" min="1850" max="2024" step="1" value="1950">
            </div>
            <button id="actionBtn" class="big-btn">✅ ПРОВЕРИТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
